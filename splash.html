<!DOCTYPE html>

<html lang="ru">

  <head>

    <meta charset="UTF-8" />

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />

    <meta name="viewport" content="width=220, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Запуск</title>

    <link rel="stylesheet" href="splash.css" />

  </head>

  <body>

    <div class="shell">

      <div class="splash-inner">

        <div class="splash-hero">

          <img

            class="splash-logo"

            src="Screens/logoic.png"

            alt=""

            decoding="async"

            draggable="false"

          />

        </div>

        <div class="splash-foot">

          <p class="status-line" id="splash-line">Подготовка…</p>

          <p class="status-sub" id="splash-sub"></p>

          <div class="progress-wrap" id="splash-progress-wrap" hidden>

            <div class="progress">

              <div class="progress-fill" id="splash-progress-fill"></div>

            </div>

          </div>

          <div class="spinner-row" aria-hidden="true">

            <div class="spinner"></div>

          </div>

        </div>

      </div>

    </div>

    <script src="splash-renderer.js"></script>

  </body>

</html>
